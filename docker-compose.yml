services:
  vibevoice-asr:
    build: .
    image: vibevoice-asr:latest
    ipc: host
    network_mode: "none"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      - ${AUDIO_INPUT_DIR:-/mnt/NAS_1/Xin/openclaw/media/staging}:/input
      - ${TRANSCRIPT_OUTPUT_DIR:-/mnt/NAS_1/Xin/openclaw/media/staging/output}:/output
      - ${HF_CACHE_DIR:-/root/.cache/huggingface}:/root/.cache/huggingface:ro
      - ${RECORDINGS_DIR:-/mnt/NAS_1/Xin/openclaw/media/recordings}:/recordings
    environment:
      - HF_HUB_OFFLINE=1
      - MODEL_PATH=${MODEL_PATH:-microsoft/VibeVoice-ASR}
      - LOAD_IN_8BIT=${LOAD_IN_8BIT:-true}
      - ATTN_IMPLEMENTATION=${ATTN_IMPLEMENTATION:-flash_attention_2}
